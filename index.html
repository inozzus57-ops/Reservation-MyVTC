<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver ma Course</title>
    <style>
        :root {
            --primary-color: #25D366; /* Vert WhatsApp */
            --dark-color: #075E54;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            color: var(--dark-color);
            margin-top: 0;
            text-align: center;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #128C7E;
        }

        button img {
            width: 24px;
            margin-right: 10px;
        }

        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🚕 Réserver un chauffeur</h2>
    
    <div class="form-group">
        <label for="nom">Nom complet</label>
        <input type="text" id="nom" placeholder="Ex: Jean Dupont">
    </div>

    <div class="form-group">
        <label for="depart">Lieu de départ</label>
        <input type="text" id="depart" placeholder="Adresse, Gare, Aéroport...">
    </div>

    <div class="form-group">
        <label for="arrivee">Destination</label>
        <input type="text" id="arrivee" placeholder="Adresse d'arrivée">
    </div>

    <div class="form-group">
        <label for="date_heure">Date et Heure</label>
        <input type="datetime-local" id="date_heure">
    </div>

    <button onclick="envoyerWhatsApp()">
        Confirmer via WhatsApp
    </button>

    <div class="footer">
        Validation instantanée par message
    </div>
</div>

<script>
    function envoyerWhatsApp() {
        // 1. Récupération des valeurs
        const nom = document.getElementById('nom').value;
        const dep = document.getElementById('depart').value;
        const arr = document.getElementById('arrivee').value;
        const dateRaw = document.getElementById('date_heure').value;

        // Validation simple
        if(!nom || !dep || !arr || !dateRaw) {
            alert("Merci de remplir tous les champs.");
            return;
        }

        // Formatage de la date pour la lecture
        const dateObj = new Date(dateRaw);
        const dateAffichee = dateObj.toLocaleString('fr-FR', { 
            day: '2-digit', month: '2-digit', year: 'numeric', 
            hour: '2-digit', minute: '2-digit' 
        });

        // 2. Construction du message (format strict pour votre logiciel)
        // %0A = Retour à la ligne
        const message = `NOUVELLE_COURSE%0A` +
                        `CLIENT: ${nom}%0A` +
                        `DEP: ${dep}%0A` +
                        `ARR: ${arr}%0A` +
                        `QUAND: ${dateAffichee}`;

        // 3. VOTRE NUMÉRO (Format international sans le +)
        const monNumero = "33684523297"; // <--- REMPLACEZ PAR VOTRE NUMÉRO

        // 4. Redirection
        const url = `https://wa.me/${monNumero}?text=${encodeURIComponent(message.replace(/%0A/g, '\n'))}`;
        window.location.href = url;
    }
</script>

</body>
</html>
