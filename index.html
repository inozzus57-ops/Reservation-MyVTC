<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver ma Course - MyVTC</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCEXSxA3B15lE5w2Dzk-JHwEanBppS14IQ&libraries=places"></script>
    
    <style>
        :root {
            --primary-color: #25D366;
            --dark-color: #075E54;
            --bg-color: #f4f7f6;
            --accent-color: #34b7f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { color: var(--dark-color); margin-top: 0; text-align: center; }

        .form-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .price-box {
            background: #e7f3ef;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
            border: 1px dashed var(--primary-color);
        }

        .price-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--dark-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #128C7E; }
        
        .details { font-size: 0.8rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚕 Réserver mon VTC</h2>
    
    <div class="form-group">
        <label>Nom complet</label>
        <input type="text" id="nom" placeholder="Jean Dupont">
    </div>

    <div class="form-group">
        <label>Lieu de départ</label>
        <input type="text" id="depart" placeholder="Saisissez une adresse...">
    </div>

    <div class="form-group">
        <label>Destination</label>
        <input type="text" id="arrivee" placeholder="Saisissez une destination...">
    </div>

    <div class="form-group">
        <label>Date et Heure</label>
        <input type="datetime-local" id="date_heure" onchange="calculerTrajet()">
    </div>

    <div id="resultat_calcul" class="price-box" style="display:none;">
        <div>Estimation du prix</div>
        <div class="price-value" id="prix_affiche">0.00 €</div>
        <div class="details" id="infos_trajet">-- km | -- min</div>
    </div>

    <button onclick="envoyerWhatsApp()">
        Valider et Envoyer via WhatsApp
    </button>
</div>

<script>
    // --- CONFIGURATION TARIFAIRE (A ajuster selon MyVTC) ---
    const CONFIG = {
        priseEnCharge: 3.00,
        tarifKm: 1.50,
        tarifMinimum: 15.00,
        coeffNuit: 1.50, // +20%
        coeffDimanche: 1.30, // +25%
        numWhatsApp: "33684523297"
    };

    let distanceKm = 0;
    let dureeMinutes = 0;
    let prixFinal = 0;

    // Initialisation Google Autocomplete
    function initAutocomplete() {
        const options = { componentRestrictions: { country: "fr" }, fields: ["formatted_address"] };
        const autoDep = new google.maps.places.Autocomplete(document.getElementById('depart'), options);
        const autoArr = new google.maps.places.Autocomplete(document.getElementById('arrivee'), options);

        autoDep.addListener('place_changed', calculerTrajet);
        autoArr.addListener('place_changed', calculerTrajet);
    }

    // Calcul de la distance et du prix
    function calculerTrajet() {
        const origin = document.getElementById('depart').value;
        const destination = document.getElementById('arrivee').value;
        const dateRaw = document.getElementById('date_heure').value;

        if (!origin || !destination) return;

        const service = new google.maps.DistanceMatrixService();
        service.getDistanceMatrix({
            origins: [origin],
            destinations: [destination],
            travelMode: 'DRIVING',
        }, (response, status) => {
            if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
                const element = response.rows[0].elements[0];
                distanceKm = element.distance.value / 1000;
                dureeMinutes = Math.ceil(element.duration.value / 60);
                
                appliquerTarification(dateRaw);
            }
        });
    }

    function appliquerTarification(dateRaw) {
        let total = CONFIG.priseEnCharge + (distanceKm * CONFIG.tarifKm);
        let infos = "";

        if (dateRaw) {
            const dateObj = new Date(dateRaw);
            const heure = dateObj.getHours();
            const jour = dateObj.getDay(); // 0 = Dimanche

            // Majoration Nuit (22h-06h)
            if (heure >= 22 || heure < 6) {
                total *= CONFIG.coeffNuit;
                infos = "Tarif Nuit (+20%)";
            }
            // Majoration Dimanche
            else if (jour === 0) {
                total *= CONFIG.coeffDimanche;
                infos = "Tarif Dimanche (+25%)";
            }
        }

        // Minimum de perception
        prixFinal = Math.max(total, CONFIG.tarifMinimum).toFixed(2);

        // Affichage UI
        document.getElementById('resultat_calcul').style.display = 'block';
        document.getElementById('prix_affiche').innerText = `${prixFinal} €`;
        document.getElementById('infos_trajet').innerText = `${distanceKm.toFixed(1)} km | env. ${dureeMinutes} min | ${infos}`;
    }

    function envoyerWhatsApp() {
        const nom = document.getElementById('nom').value;
        const dep = document.getElementById('depart').value;
        const arr = document.getElementById('arrivee').value;
        const dateRaw = document.getElementById('date_heure').value;

        if(!nom || !dep || !arr || !dateRaw) {
            alert("Veuillez remplir tous les champs."); return;
        }

        const dateAffichee = new Date(dateRaw).toLocaleString('fr-FR');

        const message = `NOUVELLE_COURSE%0A` +
                        `CLIENT: ${nom}%0A` +
                        `DEP: ${dep}%0A` +
                        `ARR: ${arr}%0A` +
                        `DIST: ${distanceKm.toFixed(1)} km%0A` +
                        `PRIX: ${prixFinal}€%0A` +
                        `QUAND: ${dateAffichee}`;

        window.location.href = `https://wa.me/${CONFIG.numWhatsApp}?text=${encodeURIComponent(message.replace(/%0A/g, '\n'))}`;
    }

    window.onload = initAutocomplete;
</script>

</body>
</html>
