<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver ma Course - MyVTC</title>
    <script src="https://unpkg.com/@googlemaps/extended-component-library"></script>
    <style>
        :root {
            --primary-color: #25D366;
            --dark-color: #075E54;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { color: var(--dark-color); margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 0.9rem; }

        /* Style pour les nouveaux composants Google Autocomplete */
        gmpx-place-autocomplete {
            width: 100%;
            --gmpx-border-radius: 8px;
            --gmpx-padding: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .price-box {
            background: #e7f3ef;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
            border: 1px dashed var(--primary-color);
            display: none;
        }

        .price-value { font-size: 1.8rem; font-weight: bold; color: var(--dark-color); }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background-color: #128C7E; }
        .details { font-size: 0.8rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚕 Réserver mon VTC</h2>
    
    <div class="form-group">
        <label>Nom complet</label>
        <input type="text" id="nom" placeholder="Jean Dupont">
    </div>

    <div class="form-group">
        <label>Lieu de départ</label>
        <gmpx-place-autocomplete id="depart" placeholder="Adresse de départ"></gmpx-place-autocomplete>
    </div>

    <div class="form-group">
        <label>Destination</label>
        <gmpx-place-autocomplete id="arrivee" placeholder="Destination"></gmpx-place-autocomplete>
    </div>

    <div class="form-group">
        <label>Date et Heure</label>
        <input type="datetime-local" id="date_heure">
    </div>

    <div id="resultat_calcul" class="price-box">
        <div>Estimation du prix</div>
        <div class="price-value" id="prix_affiche">0.00 €</div>
        <div class="details" id="infos_trajet">-- km | -- min</div>
    </div>

    <button onclick="envoyerWhatsApp()">
        Valider et Envoyer via WhatsApp
    </button>
</div>

<script>
    // 1. CHARGEMENT ASYNC (Supprime l'erreur de performance)
    (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=d[q]||(d[q]=new Set),e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-options:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
        key: "AIzaSyCEXSxA3B15lE5w2Dzk-JHwEanBppS14IQ",
        v: "weekly",
        language: "fr",
        region: "FR"
    });

    const CONFIG = {
        priseEnCharge: 3.00,
        tarifKm: 1.50,
        tarifMinimum: 15.00,
        coeffNuit: 1.50,
        coeffDimanche: 1.30,
        numWhatsApp: "33684523297"
    };

    let dist = 0;
    let minTrajet = 0;
    let prixFinal = 0;

    async function init() {
        // Importation des bibliothèques Places et Routes (Distance Matrix)
        const { PlaceAutocompleteElement } = await google.maps.importLibrary("places");
        const { DistanceMatrixService } = await google.maps.importLibrary("routes");

        const elDep = document.getElementById('depart');
        const elArr = document.getElementById('arrivee');

        // Écouter les changements sur les nouveaux composants Google
        elDep.addEventListener('gmpx-placechange', () => calculer(DistanceMatrixService));
        elArr.addEventListener('gmpx-placechange', () => calculer(DistanceMatrixService));
        document.getElementById('date_heure').addEventListener('change', () => calculer(DistanceMatrixService));
    }

    async function calculer(DistanceMatrixService) {
        // Récupération des valeurs textuelles des composants Google
        const origin = document.getElementById('depart').value;
        const destination = document.getElementById('arrivee').value;
        const dateRaw = document.getElementById('date_heure').value;

        if (!origin || !destination) return;

        const service = new DistanceMatrixService();
        service.getDistanceMatrix({
            origins: [origin],
            destinations: [destination],
            travelMode: 'DRIVING',
        }, (response, status) => {
            if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
                const data = response.rows[0].elements[0];
                dist = data.distance.value / 1000;
                minTrajet = Math.ceil(data.duration.value / 60);
                
                appliquerTarif(dateRaw);
            }
        });
    }

    function appliquerTarif(dateRaw) {
        let total = CONFIG.priseEnCharge + (dist * CONFIG.tarifKm);
        let labelMajoration = "";

        if (dateRaw) {
            const dateObj = new Date(dateRaw);
            const h = dateObj.getHours();
            const j = dateObj.getDay(); // 0 = Dimanche

            if (h >= 22 || h < 6) {
                total *= CONFIG.coeffNuit;
                labelMajoration = "Tarif Nuit";
            } else if (j === 0) {
                total *= CONFIG.coeffDimanche;
                labelMajoration = "Tarif Dimanche";
            }
        }

        prixFinal = Math.max(total, CONFIG.tarifMinimum).toFixed(2);

        document.getElementById('resultat_calcul').style.display = 'block';
        document.getElementById('prix_affiche').innerText = `${prixFinal} €`;
        document.getElementById('infos_trajet').innerText = `${dist.toFixed(1)} km | env. ${minTrajet} min | ${labelMajoration}`;
    }

    function envoyerWhatsApp() {
        const nom = document.getElementById('nom').value;
        const dep = document.getElementById('depart').value;
        const arr = document.getElementById('arrivee').value;
        const date = document.getElementById('date_heure').value;

        if(!nom || !dep || !arr || !date) {
            alert("Veuillez remplir tous les champs."); return;
        }

        const msg = `NOUVELLE_COURSE%0A` +
                    `CLIENT: ${nom}%0A` +
                    `DEP: ${dep}%0A` +
                    `ARR: ${arr}%0A` +
                    `DIST: ${dist.toFixed(1)} km%0A` +
                    `PRIX: ${prixFinal}€%0A` +
                    `QUAND: ${new Date(date).toLocaleString('fr-FR')}`;

        window.location.href = `https://wa.me/${CONFIG.numWhatsApp}?text=${encodeURIComponent(msg.replace(/%0A/g, '\n'))}`;
    }

    // Lancement de l'initialisation
    init();
</script>

</body>
</html>
